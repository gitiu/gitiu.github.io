name: build Gmeek

on:
  push:
    paths:
      - "config.json"
      - "static/**"
      - ".github/workflows/Gmeek.yml"
  workflow_dispatch:
  issues:
    types: [opened, edited]
  schedule:
    - cron: "0 16 * * *"
    
jobs:
  build:
    name: Generate blog
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.owner.id == github.event.sender.id || github.event_name == 'schedule' }}
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Get config.json
        run: |
          echo "====== check config.josn file ======"
          cat config.json
          echo "====== check config.josn end  ======"
          sudo apt-get install jq

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.8

      - name: Clone source code
        run: |
          GMEEK_REPOSITORY=$(jq -r ".GMEEK_REPOSITORY // \"Meekdai/Gmeek\"" config.json)
          GMEEK_VERSION=$(jq -r ".GMEEK_VERSION" config.json)
          git clone https://github.com/${GMEEK_REPOSITORY}.git /opt/Gmeek;
          cd /opt/Gmeek/
          if [ "$GMEEK_VERSION" = 'last' ]; then
            lastTag=$(git describe --tags `git rev-list --tags --max-count=1`)
            git checkout $lastTag
          else
            git checkout $GMEEK_VERSION
          fi;

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r /opt/Gmeek/requirements.txt

      - name: Generate new html
        run: |
          cp -r ./* /opt/Gmeek/
          cd /opt/Gmeek/
          python Gmeek.py ${{ secrets.GITHUB_TOKEN }} ${{ github.repository }} --issue_number '${{ github.event.issue.number }}'
          python - <<'PY'
          import json
          from pathlib import Path

          base = json.loads(Path("blogBase.json").read_text(encoding="utf-8"))
          output = {"labelColorDict": base.get("labelColorDict", {})}
          for key, item in base.get("postListJson", {}).items():
              output[key] = {
                  "labels": item.get("labels", []),
                  "postTitle": item.get("postTitle", ""),
                  "postUrl": item.get("postUrl", ""),
                  "createdDate": item.get("createdDate", ""),
                  "dateLabelColor": item.get("dateLabelColor", ""),
                  "commentNum": item.get("commentNum", 0),
                  "description": item.get("description", ""),
              }

          meta = json.dumps(output, ensure_ascii=False, indent=2) + "\n"
          Path("static/gitiu-post-meta.json").write_text(meta, encoding="utf-8")
          Path("docs/gitiu-post-meta.json").write_text(meta, encoding="utf-8")
          PY
          cp -a /opt/Gmeek/docs ${{ github.workspace }} 
          if [ -d /opt/Gmeek/static/pages ]; then
            cp -a /opt/Gmeek/static/pages/. ${{ github.workspace }}/docs/
          fi
          cp /opt/Gmeek/static/gitiu-post-meta.json ${{ github.workspace }}/static/gitiu-post-meta.json
          cp -a /opt/Gmeek/backup ${{ github.workspace }} 
          cp /opt/Gmeek/blogBase.json ${{ github.workspace }} 
          python ${{ github.workspace }}/static/gitiu-prerender.py
          
      - name: update html
        run: |
          git config --local user.email "$(jq -r ".email" config.json)"
          git config --local user.name "${{ github.repository_owner }}"
          git add .
          git commit -a -m '🎉auto update by Gmeek action' || echo "nothing to commit"
          git push || echo "nothing to push"
          sleep 3
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/.'
          
  deploy:
    name: Deploy blog
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      pages: write
      id-token: write
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
